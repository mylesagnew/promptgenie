repos:
  # ── Ruff: lint + format ──────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 9aeda5d1f4bbd212c557da1ea78eca9e8c829e19  # v0.11.13
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # ── General file hygiene ─────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: cef0300fd0fc4d2a87a85fa2093c6b283ea36f4b  # v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]

  # ── Secret scanning ──────────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: 01886c8a910c64595c47f186ca1ffc0b77fa5458  # v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: uv\.lock

  # ── PromptGenie quality gates (requires promptgenie installed) ───────────
  - repo: local
    hooks:
      - id: promptgenie-lint
        name: PromptGenie lint
        language: system
        entry: promptgenie lint
        files: \.prompt\.md$
        pass_filenames: true

      - id: promptgenie-scan
        name: PromptGenie security scan
        language: system
        entry: promptgenie scan
        files: \.prompt\.md$
        pass_filenames: true

      - id: promptgenie-test
        name: PromptGenie prompt tests
        language: system
        entry: promptgenie test
        files: \.prompt-test\.yaml$
        pass_filenames: true
