name: Release

# Triggered by a semver tag pushed to main (e.g. v1.0.5).
# Requires a protected "release" environment with required reviewer approval
# and a PyPI Trusted Publisher configured for this repo/workflow.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  # ── 1. Gate: full test + lint + security must pass on the tagged commit ──
  verify:
    name: Verify (Python 3.12)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          python-version: "3.12"

      - name: Install dev dependencies (locked)
        run: uv sync --frozen --extra dev --extra benchmark

      - name: Tests
        run: uv run pytest tests/ --tb=short -q

      - name: ruff
        run: uv run ruff check promptgenie/ && uv run ruff format --check promptgenie/

      - name: mypy
        run: uv run mypy promptgenie

      - name: bandit
        run: uv run bandit -r promptgenie/ -ll -q

      - name: pip-audit
        run: uv run pip-audit --skip-editable --progress-spinner off

      - name: Version consistency check
        run: |
          PKG_VER=$(uv run python -c "from importlib.metadata import version; print(version('promptgenie'))")
          TAG_VER="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "ERROR: pyproject.toml version ($PKG_VER) does not match git tag ($TAG_VER)"
            exit 1
          fi
          echo "Version check passed: $PKG_VER"

  # ── 2. Build: sdist + wheel + SBOM ──
  build:
    name: Build & SBOM
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          python-version: "3.12"

      - name: Install dev dependencies (locked)
        run: uv sync --frozen --extra dev

      - name: Build sdist and wheel
        run: uv build

      - name: Verify dist with twine
        run: uv run --with twine twine check dist/*

      - name: Generate CycloneDX SBOM
        run: |
          uv run cyclonedx-py environment \
            --output-format json \
            --outfile dist/sbom.cyclonedx.json
          echo "SBOM generated:"
          cat dist/sbom.cyclonedx.json | python3 -c "
          import sys, json
          sbom = json.load(sys.stdin)
          comps = sbom.get('components', [])
          print(f'  Components: {len(comps)}')
          print(f'  BOM serial: {sbom.get(\"serialNumber\", \"n/a\")}')
          "

      - name: Upload dist artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── 3. Publish: PyPI via OIDC Trusted Publishing ──
  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write   # required for OIDC trusted publishing

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing — no API token)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true

  # ── 4. Attest: GitHub artifact provenance ──
  attest:
    name: Attest build provenance
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # required for OIDC signing
      attestations: write    # required to write attestations

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: "dist/*.whl,dist/*.tar.gz"

  # ── 5. Release: create GitHub Release with all artifacts ──
  github-release:
    name: GitHub Release
    needs: [publish, attest]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create a release

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Extract changelog entry for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the block between ## [VERSION] and the next ## [
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          # Write to a file to avoid shell quoting issues
          echo "$NOTES" > release_notes.md
          echo "Extracted release notes for $VERSION"
          head -5 release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          gh release create "$VERSION" \
            --title "PromptGenie $VERSION" \
            --notes-file release_notes.md \
            dist/*.whl \
            dist/*.tar.gz \
            dist/sbom.cyclonedx.json
