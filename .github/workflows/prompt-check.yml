name: Prompt Check

on:
  push:
    paths:
      - '**.md'
      - '**.prompt-test.yaml'
      - '**.workflow.yaml'
  pull_request:
    paths:
      - '**.md'
      - '**.prompt-test.yaml'
      - '**.workflow.yaml'

jobs:
  prompt-lint:
    name: Lint prompt files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install PromptGenie
        run: pip install -e . --quiet

      - name: Find prompt files
        id: find
        run: |
          files=$(find . \
            -not -path './.git/*' \
            -not -path './.venv/*' \
            \( -name '*.md' -o -name '*.prompt.md' \) \
            | grep -v README | grep -v CHANGELOG | grep -v LICENSE \
            | sort)
          echo "Found prompt files:"
          echo "$files"
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Lint prompt files
        run: |
          FAILED=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "──────────────────────────────────────────"
            echo "Linting: $file"
            if ! promptgenie lint "$file"; then
              FAILED=1
            fi
          done <<< "${{ steps.find.outputs.files }}"
          exit $FAILED

  prompt-scan:
    name: Security scan prompt files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install PromptGenie
        run: pip install -e . --quiet

      - name: Find prompt files
        id: find
        run: |
          files=$(find . \
            -not -path './.git/*' \
            -not -path './.venv/*' \
            \( -name '*.md' -o -name '*.prompt.md' \) \
            | grep -v README | grep -v CHANGELOG | grep -v LICENSE \
            | sort)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Scan prompt files for security risks
        run: |
          FAILED=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "──────────────────────────────────────────"
            echo "Scanning: $file"
            if ! promptgenie scan "$file"; then
              FAILED=1
            fi
          done <<< "${{ steps.find.outputs.files }}"
          exit $FAILED

  prompt-test:
    name: Run prompt test suites
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install PromptGenie
        run: pip install -e . --quiet

      - name: Find test suites
        id: find
        run: |
          files=$(find . \
            -not -path './.git/*' \
            -not -path './.venv/*' \
            -name '*.prompt-test.yaml' \
            | sort)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run prompt test suites
        run: |
          FAILED=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "──────────────────────────────────────────"
            echo "Testing: $file"
            if ! promptgenie test "$file"; then
              FAILED=1
            fi
          done <<< "${{ steps.find.outputs.files }}"
          exit $FAILED
