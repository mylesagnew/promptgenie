name: Prompt Check

on:
  push:
    paths:
      - '**.md'
      - '**.prompt-test.yaml'
      - '**.workflow.yaml'
  pull_request:
    paths:
      - '**.md'
      - '**.prompt-test.yaml'
      - '**.workflow.yaml'

jobs:
  prompt-lint:
    name: Lint prompt files
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # required for SARIF upload
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install PromptGenie
        run: pip install -e . --quiet

      - name: Find prompt files
        id: find
        run: |
          files=$(find . \
            -not -path './.git/*' \
            -not -path './.venv/*' \
            \( -name '*.md' -o -name '*.prompt.md' \) \
            | grep -v README | grep -v CHANGELOG | grep -v LICENSE \
            | grep -v SECURITY | grep -v ROADMAP | grep -v CONTRIBUTING | grep -v THREAT_MODEL \
            | grep -v '/tests/' | grep -v '/examples/' | grep -v '/docs/' \
            | sort)
          echo "Found prompt files:"
          echo "$files"
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Lint prompt files
        run: |
          FAILED=0
          mkdir -p sarif-results
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "──────────────────────────────────────────"
            echo "Linting: $file"
            safe=$(echo "$file" | tr '/' '_' | sed 's/^\.//')
            promptgenie lint "$file" --format sarif --out "sarif-results/lint-${safe}.sarif" || true
            if ! promptgenie lint "$file"; then
              FAILED=1
            fi
          done <<< "${{ steps.find.outputs.files }}"
          exit $FAILED

      - name: Merge lint SARIFs into one
        if: always()
        run: |
          shopt -s nullglob
          files=(sarif-results/lint-*.sarif)
          if [ ${#files[@]} -eq 0 ]; then
            echo '{"version":"2.1.0","runs":[]}' > sarif-results/lint-combined.sarif
          else
            jq -s '{version:.[0].version,"$schema":.[0]["$schema"],runs:[.[].runs[]]}' "${files[@]}" \
              > sarif-results/lint-combined.sarif
            rm "${files[@]}"
          fi

      - name: Upload lint SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@66b39da20ccc656acc90dd27ea30f5d458ec33ce # v3
        with:
          sarif_file: sarif-results/lint-combined.sarif
          category: promptgenie-lint
        continue-on-error: true   # graceful if code scanning not enabled

  prompt-scan:
    name: Security scan prompt files
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install PromptGenie
        run: pip install -e . --quiet

      - name: Find prompt files
        id: find
        run: |
          files=$(find . \
            -not -path './.git/*' \
            -not -path './.venv/*' \
            \( -name '*.md' -o -name '*.prompt.md' \) \
            | grep -v README | grep -v CHANGELOG | grep -v LICENSE \
            | grep -v SECURITY | grep -v ROADMAP | grep -v CONTRIBUTING | grep -v THREAT_MODEL \
            | grep -v '/tests/' | grep -v '/examples/' | grep -v '/docs/' \
            | sort)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Scan prompt files for security risks
        run: |
          FAILED=0
          mkdir -p sarif-results
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "──────────────────────────────────────────"
            echo "Scanning: $file"
            safe=$(echo "$file" | tr '/' '_' | sed 's/^\.//')
            promptgenie scan "$file" --format sarif --out "sarif-results/scan-${safe}.sarif" || true
            if ! promptgenie scan "$file"; then
              FAILED=1
            fi
          done <<< "${{ steps.find.outputs.files }}"
          exit $FAILED

      - name: Merge scan SARIFs into one
        if: always()
        run: |
          shopt -s nullglob
          files=(sarif-results/scan-*.sarif)
          if [ ${#files[@]} -eq 0 ]; then
            echo '{"version":"2.1.0","runs":[]}' > sarif-results/scan-combined.sarif
          else
            jq -s '{version:.[0].version,"$schema":.[0]["$schema"],runs:[.[].runs[]]}' "${files[@]}" \
              > sarif-results/scan-combined.sarif
            rm "${files[@]}"
          fi

      - name: Upload scan SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@66b39da20ccc656acc90dd27ea30f5d458ec33ce # v3
        with:
          sarif_file: sarif-results/scan-combined.sarif
          category: promptgenie-scan
        continue-on-error: true

  prompt-test:
    name: Run prompt test suites
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install PromptGenie
        run: pip install -e . --quiet

      - name: Find test suites
        id: find
        run: |
          files=$(find . \
            -not -path './.git/*' \
            -not -path './.venv/*' \
            -name '*.prompt-test.yaml' \
            | grep -v '/tests/' | grep -v '/examples/' | grep -v '/docs/' \
            | sort)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run prompt test suites
        # ANTHROPIC_API_KEY intentionally not exposed — promptgenie test runs offline (lint/scan/score)
        run: |
          FAILED=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "──────────────────────────────────────────"
            echo "Testing: $file"
            if ! promptgenie test "$file"; then
              FAILED=1
            fi
          done <<< "${{ steps.find.outputs.files }}"
          exit $FAILED
