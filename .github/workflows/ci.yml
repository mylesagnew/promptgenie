name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install with dev dependencies (locked)
        run: uv sync --frozen --extra dev --extra benchmark

      - name: Run tests
        run: uv run pytest tests/ --tb=short -q --cov=promptgenie --cov-report=term-missing

  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          python-version: "3.12"

      - name: Install dev dependencies (locked)
        run: uv sync --frozen --extra dev

      - name: ruff check
        run: uv run ruff check promptgenie/ tests/

      - name: ruff format check
        run: uv run ruff format --check promptgenie/ tests/

      - name: mypy
        run: uv run mypy promptgenie

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          python-version: "3.12"

      - name: Install dev dependencies (locked)
        run: uv sync --frozen --extra dev

      - name: bandit
        run: uv run bandit -r promptgenie/ -ll -q

      - name: pip-audit
        run: uv run pip-audit --skip-editable --progress-spinner off

      - name: Version consistency (pyproject / CHANGELOG / SECURITY)
        run: python3 scripts/check_version_drift.py

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # full history so gitleaks scans all commits

      - name: gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  vscode-extension:
    name: VS Code extension (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies (locked)
        run: npm ci

      - name: Audit dependencies (no high/critical)
        # --audit-level=high fails if any high or critical vulnerabilities are found
        run: npm audit --audit-level=high

      - name: Compile TypeScript
        run: npm run compile

      - name: Lint TypeScript
        run: npm run lint

      - name: Upload compiled extension artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vscode-extension-dist
          path: vscode-extension/out/
          if-no-files-found: error

  build:
    name: Build & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          python-version: "3.12"

      - name: Build package
        run: uv build

      - name: Check dist
        run: uv run --with twine twine check dist/*

      - name: Smoke test installed CLI
        run: |
          pip install dist/*.whl
          promptgenie --version
          promptgenie list-targets
          promptgenie list-templates
          promptgenie generate "test task" --target claude-code --no-lint --no-scan
