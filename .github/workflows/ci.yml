name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install with dev dependencies (locked)
        run: uv sync --frozen --extra dev

      - name: Run tests
        run: uv run pytest tests/ --tb=short -q

  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"

      - name: Install dev dependencies (locked)
        run: uv sync --frozen --extra dev

      - name: ruff check
        run: uv run ruff check promptgenie/

      - name: ruff format check
        run: uv run ruff format --check promptgenie/

      - name: mypy
        run: uv run mypy promptgenie

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"

      - name: Install dev dependencies (locked)
        run: uv sync --frozen --extra dev

      - name: bandit
        run: uv run bandit -r promptgenie/ -ll -q

      - name: pip-audit
        run: uv run pip-audit --skip-editable --progress-spinner off

  build:
    name: Build & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"

      - name: Build package
        run: uv build

      - name: Check dist
        run: uv run --with twine twine check dist/*

      - name: Smoke test installed CLI
        run: |
          pip install dist/*.whl
          promptgenie --version
          promptgenie list-targets
          promptgenie list-templates
          promptgenie generate "test task" --target claude-code --no-lint --no-scan
