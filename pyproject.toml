[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "promptgenie"
version = "1.0.7"
description = "Secure prompt engineering for AI agents and engineering teams"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Myles Agnew" }]
requires-python = ">=3.10"
keywords = ["prompt-engineering", "llm", "ai", "security", "cli", "agents"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Utilities",
]
dependencies = [
    "click>=8.0",
    "pyyaml>=6.0",
    "rich>=13.0",
    "tiktoken>=0.7",
    "anthropic>=0.100",
]

[project.urls]
Homepage    = "https://github.com/mylesagnew/promptgenie"
Repository  = "https://github.com/mylesagnew/promptgenie"
Issues      = "https://github.com/mylesagnew/promptgenie/issues"

[project.scripts]
promptgenie = "promptgenie.cli:cli"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "bandit>=1.7",
    "pip-audit>=2.7",
    "mypy>=1.10",
    "types-PyYAML>=6.0",
    "build>=1.2",
    "twine>=5.0",
    "cyclonedx-bom>=4.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["promptgenie*"]

[tool.setuptools.package-data]
promptgenie = [
    "profiles/*.yaml",
    "templates/*.yaml",
    "context-packs/*.yaml",
    "packs/**/*.yaml",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts   = "-v --tb=short"

[tool.ruff]
target-version = "py310"
line-length    = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4", "SIM"]
ignore = ["E501"]

[tool.bandit]
exclude_dirs = ["tests", ".venv"]
skips        = ["B101"]   # allow assert in tests

[tool.mypy]
python_version         = "3.10"
warn_return_any        = true
warn_unused_configs    = true
ignore_missing_imports = true
