name: regulated-industries-context
version: "1.0.0"
description: "Context pack for regulated industries — HIPAA healthcare constraints, SOX financial controls, PCI-DSS, and FCA/SEC compliance guidelines for AI prompt engineering."
type: context
author: "PromptGenie Community"
license: MIT

context_items:
  - id: hipaa-constraints
    title: "HIPAA Constraints for AI Prompts"
    content: |
      When using AI in a healthcare context subject to HIPAA:

      1. **PHI prohibition** — Never include Protected Health Information (PHI) — patient names,
         dates of birth, SSNs, diagnoses, treatment records, insurance IDs — in prompts sent to
         external AI providers unless a signed BAA (Business Associate Agreement) is in place.
      2. **De-identification** — Before using patient data in a prompt, de-identify it per
         HIPAA Safe Harbor (45 CFR §164.514(b)) or Expert Determination methods.
      3. **Minimum necessary** — Only include the minimum data necessary to accomplish the task.
         Do not paste entire patient records when a summary suffices.
      4. **Audit logging** — Log all AI interactions involving clinical workflows. Retain logs
         per your organisation's HIPAA retention policy.
      5. **Output validation** — Clinical recommendations generated by AI must be reviewed by a
         licensed clinician before being acted upon. AI is a decision-support tool, not a
         decision-maker in clinical contexts.

  - id: sox-financial-controls
    title: "SOX Financial Controls for AI"
    content: |
      When using AI in financial reporting or accounting workflows subject to SOX:

      1. **No unreviewed financial outputs** — AI-generated figures, forecasts, or journal entries
         must be reviewed and approved by a qualified accountant before use in financial statements.
      2. **Audit trail** — Maintain an audit trail of all AI-assisted financial analysis,
         including the prompt used, model version, and reviewer sign-off.
      3. **Segregation of duties** — The person submitting a prompt for financial analysis
         should not be the sole reviewer of the output. Apply the same segregation-of-duties
         controls as manual processes.
      4. **Material information** — Do not use external AI services to process material
         non-public information (MNPI) without legal review of your data handling obligations.
      5. **Model risk** — Document AI tools used in financial workflows in your model risk
         inventory and subject them to periodic validation per SR 11-7 guidance.

  - id: pci-dss-constraints
    title: "PCI-DSS Constraints for AI Prompts"
    content: |
      When using AI in payment card or e-commerce environments subject to PCI-DSS:

      1. **Cardholder data prohibition** — Never include Primary Account Numbers (PAN),
         CVV/CVC codes, full magnetic stripe data, or PINs in prompts. This applies
         regardless of whether the data is tokenised or masked.
      2. **Scope minimisation** — Keep AI tools outside the cardholder data environment (CDE)
         wherever possible. If AI must access CDE data, ensure the provider is PCI-DSS
         compliant and sign a data processing agreement.
      3. **Logging and monitoring** — Log all AI-assisted access to payment systems.
         Retain logs for at least 12 months per PCI-DSS Requirement 10.
      4. **Vulnerability management** — AI-generated code that handles payment data must be
         reviewed for injection, cryptographic, and access-control vulnerabilities before
         deployment.

  - id: fca-sec-ai-guidance
    title: "FCA / SEC AI Guidance for Financial Services"
    content: |
      Key AI governance expectations from the UK FCA and US SEC for financial services firms:

      **FCA (UK):**
      1. AI tools used in regulated activities must be subject to the same governance
         as other technology systems under the Senior Managers and Certification Regime (SMCR).
      2. Model outputs used in customer-facing decisions (credit, insurance, investment advice)
         must be explainable and auditable.
      3. Fair Treatment of Customers (FCA Consumer Duty) requires AI outputs to be tested
         for bias across protected characteristics before deployment.

      **SEC (US):**
      1. Investment advisers using AI for portfolio management or client communications must
         ensure outputs comply with the Investment Advisers Act of 1940.
      2. AI-generated research or recommendations distributed to clients are subject to the
         same disclosure requirements as human-produced research.
      3. Conflicts of interest in AI-driven advice (e.g., model trained on proprietary data)
         must be disclosed.

  - id: general-regulated-checklist
    title: "General Regulated-Industry AI Checklist"
    content: |
      Before deploying AI prompts in any regulated industry context:

      - [ ] Data classification completed — know which regulatory regime covers your data.
      - [ ] Data processing agreement or BAA signed with the AI provider if processing
            regulated data (PHI, PII, financial records).
      - [ ] Prompts reviewed by legal and compliance for regulatory alignment.
      - [ ] Human review gate in place for all consequential outputs.
      - [ ] Audit logging enabled and retention period confirmed with legal.
      - [ ] Incident response plan updated to include AI-related incidents.
      - [ ] AI tool added to technology/model risk register.
      - [ ] Annual review scheduled to reassess as regulations evolve.
